name: YouTube Downloader Backend

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true
        type: string
      format:
        description: 'Format (mp4/mp3)'
        required: true
        default: 'mp4'
        type: string
      resolution:
        description: 'Resolution'
        required: false
        default: '1080'
        type: string
      start_time:
        description: 'Start time'
        required: false
        type: string
      end_time:
        description: 'End time'
        required: false
        type: string

jobs:
  download-and-process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install yt-dlp
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      # Install and setup Cloudflare WARP for bypassing YouTube blocks
      - name: Setup Cloudflare WARP
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ focal main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update && sudo apt-get install -y cloudflare-warp
          warp-cli --accept-tos register
          warp-cli --accept-tos set-mode proxy
          warp-cli --accept-tos set-proxy-port 40000
          warp-cli --accept-tos connect
          sleep 5

      - name: Run Downloader Script
        run: |
          python downloader.py \
            --url "${{ inputs.url }}" \
            --format "${{ inputs.format }}" \
            --resolution "${{ inputs.resolution }}" \
            --start "${{ inputs.start_time }}" \
            --end "${{ inputs.end_time }}"

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Processed-Video-or-Audio
          path: final_output.*
